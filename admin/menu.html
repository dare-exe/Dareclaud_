<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — Admin · Hotel Green Land</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">🏨 Green Land<small>ADMIN PANEL</small></div>
      <nav>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="bookings.html">📋 Bookings</a>
        <a href="rooms.html">🛏️ Rooms</a>
        <a href="menu.html">🍽️ Menu</a>
        <a href="gallery.html">🖼️ Gallery</a>
        <a href="settings.html">⚙️ Settings</a>
        <a href="/" target="_blank">🌐 View Website</a>
      </nav>
      <button class="logout">Log out</button>
    </aside>
    <main class="main">
      <div class="main-head"><h1>Manage Restaurant Menu</h1></div>

      <div class="panel">
        <h2>Add / Edit Menu Item</h2>
        <form id="menu-form">
          <input type="hidden" name="id" value="">
          <div class="form-grid">
            <div class="form-group">
              <label>Item Name *</label>
              <input name="name" type="text" required placeholder="e.g. Veg Thali">
            </div>
            <div class="form-group">
              <label>Category</label>
              <select name="category">
                <option value="breakfast">Breakfast</option>
                <option value="lunch" selected>Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="drinks">Drinks</option>
              </select>
            </div>
            <div class="form-group">
              <label>Price (Rs.)</label>
              <input name="price" type="number" min="0" step="5" placeholder="180">
            </div>
            <div class="form-group full">
              <label>Description</label>
              <input name="description" type="text" placeholder="Short description…">
            </div>
          </div>
          <button type="submit" class="btn btn-green" style="margin-top:16px">Add Item</button>
          <div id="menu-msg" class="msg"></div>
        </form>
      </div>

      <div class="panel">
        <h2>All Menu Items</h2>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Item</th><th>Category</th><th>Price</th><th>Actions</th></tr></thead>
            <tbody id="menu-table"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="/admin/js/admin.js"></script>
</body>
</html>
