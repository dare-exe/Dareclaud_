<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Admin · Hotel Green Land</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">🏨 Green Land<small>ADMIN PANEL</small></div>
      <nav>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="bookings.html">📋 Bookings</a>
        <a href="rooms.html">🛏️ Rooms</a>
        <a href="menu.html">🍽️ Menu</a>
        <a href="gallery.html">🖼️ Gallery</a>
        <a href="settings.html">⚙️ Settings</a>
        <a href="/" target="_blank">🌐 View Website</a>
      </nav>
      <button class="logout">Log out</button>
    </aside>
    <main class="main">
      <div class="main-head"><h1>Manage Gallery</h1></div>

      <div class="panel">
        <h2>Upload New Image</h2>
        <form id="gallery-form" enctype="multipart/form-data">
          <div class="form-grid">
            <div class="form-group">
              <label>Title *</label>
              <input name="title" type="text" required placeholder="e.g. Garden View">
            </div>
            <div class="form-group">
              <label>Category</label>
              <select name="category">
                <option value="hotel">Hotel</option>
                <option value="rooms">Rooms</option>
                <option value="dining">Dining</option>
              </select>
            </div>
            <div class="form-group full">
              <label>Image File *</label>
              <input name="image" type="file" accept="image/*" required>
            </div>
          </div>
          <button type="submit" class="btn btn-green" style="margin-top:16px">Upload Image</button>
          <div id="gallery-msg" class="msg"></div>
        </form>
      </div>

      <div class="panel">
        <h2>All Images</h2>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Preview</th><th>Title</th><th>Category</th><th>Actions</th></tr></thead>
            <tbody id="gallery-table"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="/admin/js/admin.js"></script>
</body>
</html>
