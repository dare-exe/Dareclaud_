<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Admin · Hotel Green Land</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">🏨 Green Land<small>ADMIN PANEL</small></div>
      <nav>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="bookings.html">📋 Bookings</a>
        <a href="rooms.html">🛏️ Rooms</a>
        <a href="menu.html">🍽️ Menu</a>
        <a href="gallery.html">🖼️ Gallery</a>
        <a href="settings.html">⚙️ Settings</a>
        <a href="/" target="_blank">🌐 View Website</a>
      </nav>
      <button class="logout">Log out</button>
    </aside>
    <main class="main">
      <div class="main-head"><h1>Settings</h1></div>

      <div class="panel" style="max-width:520px">
        <h2>Change Admin Password</h2>
        <form id="password-form">
          <div class="form-group" style="margin-bottom:14px">
            <label>Current Password</label>
            <input name="current_password" type="password" required autocomplete="current-password">
          </div>
          <div class="form-group" style="margin-bottom:18px">
            <label>New Password (min 6 characters)</label>
            <input name="new_password" type="password" required minlength="6" autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-green">Change Password</button>
          <div id="password-msg" class="msg"></div>
        </form>
      </div>
    </main>
  </div>
  <script src="/admin/js/admin.js"></script>
</body>
</html>
